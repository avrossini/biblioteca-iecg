name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Testes unitários e de componentes (Vitest)
        run: npm run test:unit

      - name: Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sobe Supabase local (Docker)
        run: supabase start

      - name: Testes de banco / RLS (pgTAP)
        run: supabase test db

      - name: Navegadores do Playwright
        run: npx playwright install --with-deps chromium

      - name: Testes E2E (Playwright)
        run: npm run test:e2e

      - name: Encerra Supabase
        if: always()
        run: supabase stop
