name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Supabase local no runner (chaves-padrão de desenvolvimento).
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Testes unitários e de componentes (Vitest)
        run: npm run test:unit

      - name: Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sobe Supabase local (Docker)
        run: supabase start

      - name: Aplica migrations + seeds (garante o admin de dev para o E2E)
        run: supabase db reset

      - name: Testes de banco / RLS (pgTAP)
        run: supabase test db

      - name: Navegadores do Playwright
        run: npx playwright install --with-deps chromium

      - name: Testes E2E (Playwright)
        run: npm run test:e2e

      - name: Encerra Supabase
        if: always()
        run: supabase stop
